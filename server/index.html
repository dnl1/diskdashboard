<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>diskdashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .bar { transition: width 0.8s ease-in-out; }
    .card { transition: all 0.15s; cursor: pointer; }
    .card:hover { transform: translateY(-2px); }
    .card.active { border-color: #818cf8; box-shadow: 0 0 0 1px #818cf8; }
    .modal-overlay { background: rgba(0,0,0,0.6); }
    .file-checkbox, #select-all { accent-color: #818cf8; }
    #smart-modal-body::-webkit-scrollbar { width: 8px; }
    #smart-modal-body::-webkit-scrollbar-track { background: #1f2937; border-radius: 4px; }
    #smart-modal-body::-webkit-scrollbar-thumb { background: #6b7280; border-radius: 4px; border: 2px solid #1f2937; }
    #smart-modal-body::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
    #smart-modal-body { scrollbar-width: thin; scrollbar-color: #6b7280 #1f2937; }
    #toast.show { transform: translateY(0); opacity: 1; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
  <div class="max-w-6xl mx-auto px-4 py-6">
    <header class="mb-8">
      <div class="flex items-center justify-between">
        <div>
          <h1 class="text-3xl font-bold text-white tracking-tight">
            <span class="text-emerald-400">disk</span>dashboard
          </h1>
          <p class="text-gray-400 text-sm mt-1">Disk and file analysis</p>
        </div>
        <button onclick="refreshAll()" class="px-4 py-2 bg-gray-800 hover:bg-gray-700 rounded-lg text-sm font-medium transition flex items-center gap-2 border border-gray-700">
          <svg class="w-4 h-4" id="refreshIcon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
          </svg>
          Refresh
        </button>
      </div>
    </header>

    <section class="mb-8">
      <div class="flex items-center gap-2 mb-4">
        <div class="w-2 h-2 rounded-full bg-emerald-400"></div>
        <h2 class="text-lg font-semibold text-gray-200">Disks</h2>
        <span id="focused-badge" class="hidden ml-2 text-xs bg-indigo-500/20 text-indigo-300 px-2 py-0.5 rounded-full"></span>
      </div>
      <div id="disks-container" class="grid gap-4 md:grid-cols-2">
        <div class="col-span-full flex justify-center py-12">
          <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-emerald-400"></div>
        </div>
      </div>
    </section>

    <section>
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-2">
          <div class="w-2 h-2 rounded-full bg-violet-400"></div>
          <h2 class="text-lg font-semibold text-gray-200">Largest Files</h2>
          <span class="text-xs text-gray-500">(&gt;100 MB)</span>
        </div>
        <div class="flex gap-2">
          <select id="dir-select" class="bg-gray-800 border border-gray-700 rounded-lg px-3 py-1.5 text-sm text-gray-300">
            <option value="all">All disks</option>
          </select>
        </div>
      </div>
      <div id="files-container" class="overflow-hidden rounded-xl border border-gray-800">
        <div class="flex justify-center py-12">
          <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-violet-400"></div>
        </div>
      </div>
    </section>
  </div>

  <div id="toast" class="fixed bottom-6 right-6 z-50 hidden max-w-md bg-gray-900 border border-gray-700 rounded-xl shadow-2xl p-4 transition-all duration-300 translate-y-4 opacity-0">
    <div class="flex items-start gap-3">
      <div id="toast-icon" class="flex-shrink-0 w-5 h-5 mt-0.5"></div>
      <div class="flex-1 min-w-0">
        <p id="toast-message" class="text-sm text-gray-200 leading-relaxed"></p>
        <div id="toast-details" class="mt-2 max-h-32 overflow-y-auto text-xs text-gray-400 space-y-1 hidden"></div>
      </div>
      <button onclick="hideToast()" class="flex-shrink-0 text-gray-500 hover:text-gray-300 p-0.5">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
  </div>

  <div id="smart-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center modal-overlay p-4">
    <div class="bg-gray-900 rounded-2xl border border-gray-700 w-full max-w-3xl max-h-[85vh] overflow-hidden shadow-2xl">
      <div class="flex items-center justify-between p-5 border-b border-gray-800">
        <div>
          <h3 id="smart-modal-title" class="text-lg font-bold text-white"></h3>
          <p id="smart-modal-subtitle" class="text-sm text-gray-400 mt-0.5"></p>
        </div>
        <button onclick="closeSmart()" class="text-gray-400 hover:text-white p-1">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div id="smart-modal-body" class="modal-body p-5 overflow-y-auto" style="max-height: calc(85vh - 80px);">
        <div class="flex justify-center py-8">
          <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-400"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="delete-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center modal-overlay p-4">
    <div class="bg-gray-900 rounded-2xl border border-gray-700 w-full max-w-lg shadow-2xl">
      <div class="flex items-center justify-between p-5 border-b border-gray-800">
        <h3 class="text-lg font-bold text-white">Confirm deletion</h3>
        <button onclick="closeDeleteModal()" class="text-gray-400 hover:text-white p-1">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="p-5">
        <p class="text-gray-300 mb-4">Are you sure you want to delete <strong id="delete-count" class="text-white"></strong> file(s)?</p>
        <div id="delete-file-list" class="modal-body max-h-40 overflow-y-auto mb-4 text-sm text-gray-400 space-y-1 bg-gray-950/50 rounded-lg p-3"></div>
        <p class="text-red-400 text-xs mb-4">This action cannot be undone.</p>
        <div class="flex justify-end gap-3">
          <button onclick="closeDeleteModal()" class="px-4 py-2 bg-gray-800 hover:bg-gray-700 rounded-lg text-sm transition">Cancel</button>
          <button id="confirm-delete-btn" onclick="executeDelete()" class="px-4 py-2 bg-red-600 hover:bg-red-500 rounded-lg text-sm font-medium text-white transition">Delete</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let focusedMount = null;
    let disksData = [];
    let disksLoaded = false;
    let filesLoaded = false;

    async function loadDisks() {
      const el = document.getElementById('disks-container');
      if (!disksLoaded) {
        el.innerHTML = `<div class="col-span-full flex justify-center py-12"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-emerald-400"></div></div>`;
      }
      try {
        const res = await fetch('/api/disks');
        disksData = await res.json();
        renderDisks(disksData);
        disksLoaded = true;
        loadFiles();
      } catch(e) {
        if (!disksLoaded) {
          el.innerHTML = `<div class="col-span-full text-center text-red-400 py-8">Error loading disks</div>`;
        }
      }
    }

    function updateSelect(disks) {
      const sel = document.getElementById('dir-select');
      const cur = sel.value;
      sel.innerHTML = `<option value="all">All disks</option>` +
        disks.filter(d => d.mount_point !== '/boot/efi' && d.mount_point !== '/boot')
             .map(d => `<option value="${d.mount_point}">${d.mount_point} ${d.device}</option>`).join('');
      if (focusedMount) {
        sel.value = focusedMount;
      } else if (cur === 'all' || ![...sel.options].some(o => o.value === cur)) {
        sel.value = 'all';
      } else {
        sel.value = cur;
      }
    }

    function renderDisks(disks) {
      const el = document.getElementById('disks-container');
      if (!disks.length) {
        el.innerHTML = `<div class="col-span-full text-center text-gray-500 py-8">No disks found</div>`;
        return;
      }

      updateSelect(disks);

      el.innerHTML = disks.filter(d => d.mount_point !== '/boot/efi' && d.mount_point !== '/boot')
        .map((d) => {
        const pct = d.used_percent.toFixed(1);
        const color = pct > 90 ? 'bg-red-500' : pct > 75 ? 'bg-yellow-500' : 'bg-emerald-500';
        const smartIcon = d.smart_status === 'PASSED' ? '✅' : d.smart_status === 'FAILED' ? '❌' : '❓';
        const smartColor = d.smart_status === 'PASSED' ? 'text-emerald-400' : d.smart_status === 'FAILED' ? 'text-red-400' : 'text-gray-500';
        const active = focusedMount === d.mount_point;
        const baseDev = d.base_device || '';
        return `
          <div class="card bg-gray-900 rounded-xl p-5 border ${active ? 'border-indigo-400 active' : 'border-gray-800'}"
               onclick="focusDisk('${d.mount_point}', '${baseDev}')">
            <div class="flex items-start justify-between mb-3">
              <div>
                <div class="font-mono text-sm text-emerald-400 font-medium">${d.device}</div>
                <div class="text-xs text-gray-500">${d.mount_point}</div>
                ${baseDev ? `<div class="text-xs text-gray-600 mt-0.5 font-mono">${baseDev}</div>` : ''}
              </div>
              <div class="text-right">
                ${d.model && baseDev ? `<div class="text-xs text-gray-400">${d.model}</div>` : ''}
                ${baseDev
                  ? `<div class="${smartColor} font-medium text-xs mt-0.5 cursor-pointer hover:underline" onclick="event.stopPropagation();showSmart('${baseDev}','${d.model}')">${smartIcon} SMART: ${d.smart_status || 'N/A'}</div>`
                  : `<div class="text-gray-600 font-medium text-xs mt-0.5">❌ SMART: N/A</div>`}
              </div>
            </div>
            <div class="space-y-1.5 mb-3 text-sm">
              <div class="flex justify-between text-gray-400">
                <span>Total</span>
                <span class="text-gray-200 font-mono">${d.total_human}</span>
              </div>
              <div class="flex justify-between text-gray-400">
                <span>Used</span>
                <span class="text-gray-200 font-mono">${d.used_human}</span>
              </div>
              <div class="flex justify-between text-gray-400">
                <span>Free</span>
                <span class="text-gray-200 font-mono">${d.avail_human}</span>
              </div>
            </div>
            <div class="w-full h-2.5 bg-gray-800 rounded-full overflow-hidden">
              <div class="bar h-full rounded-full ${color}" style="width:0%" data-width="${pct}"></div>
            </div>
            <div class="text-right text-xs text-gray-500 mt-1">${pct}%</div>
          </div>
        `;
      }).join('');
      setTimeout(animateBars, 100);
    }

    function focusDisk(mount, baseDev) {
      if (focusedMount === mount) {
        focusedMount = null;
        document.getElementById('dir-select').value = 'all';
      } else {
        focusedMount = mount;
        document.getElementById('dir-select').value = mount;
      }
      const badge = document.getElementById('focused-badge');
      if (focusedMount) {
        badge.textContent = focusedMount;
        badge.classList.remove('hidden');
      } else {
        badge.classList.add('hidden');
      }
      renderDisks(disksData);
      loadFiles();
    }

    function getFilesParam() {
      const sel = document.getElementById('dir-select');
      if (sel.value === 'all') {
        const mounts = disksData.filter(d =>
          d.mount_point !== '/boot' && d.mount_point !== '/boot/efi'
        ).map(d => 'dir=' + encodeURIComponent(d.mount_point)).join('&');
        return mounts;
      }
      return 'dir=' + encodeURIComponent(sel.value);
    }

    async function showSmart(dev, model) {
      const modal = document.getElementById('smart-modal');
      const title = document.getElementById('smart-modal-title');
      const subtitle = document.getElementById('smart-modal-subtitle');
      const body = document.getElementById('smart-modal-body');

      title.textContent = 'SMART Details — ' + (model || '/dev/' + dev);
      subtitle.textContent = '/dev/' + dev;
      body.innerHTML = `<div class="flex justify-center py-8"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-400"></div></div>`;
      modal.classList.remove('hidden');

      try {
        const res = await fetch('/api/smart?dev=' + encodeURIComponent(dev));
        if (!res.ok) throw new Error(await res.text());
        const data = await res.json();
        renderSmartBody(body, data);
      } catch(e) {
        body.innerHTML = `<div class="text-red-400 text-center py-8">Error loading SMART data: ${e.message}</div>`;
      }
    }

    function closeSmart() {
      document.getElementById('smart-modal').classList.add('hidden');
    }

    function renderSmartBody(body, data) {
      const healthColor = data.health === 'PASSED' ? 'text-emerald-400' : 'text-red-400';
      const healthIcon = data.health === 'PASSED' ? '✅' : '❌';

      let html = `
        <div class="flex items-center gap-4 mb-6 p-4 bg-gray-800/50 rounded-xl">
          <div class="text-2xl ${healthColor}">${healthIcon}</div>
          <div>
            <div class="font-bold ${healthColor}">${data.health}</div>
            <div class="text-xs text-gray-400">${data.model} · ${data.serial} · FW ${data.firmware}</div>
          </div>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="text-gray-500 text-xs tracking-wide uppercase border-b border-gray-800">
                <th class="text-left py-2 pr-3">ID</th>
                <th class="text-left py-2 pr-3">Attribute</th>
                <th class="text-right py-2 pr-3">Value</th>
                <th class="text-right py-2 pr-3">Worst</th>
                <th class="text-right py-2 pr-3">Thresh</th>
                <th class="text-right py-2 pr-4">Raw</th>
                <th class="text-left py-2">Interpretation</th>
              </tr>
            </thead>
            <tbody>
      `;

      data.attributes.forEach(a => {
        const rowColor = a.status === 'critical' ? 'bg-red-900/20' : a.status === 'warning' ? 'bg-yellow-900/20' : 'bg-emerald-900/10';
        const valColor = a.status === 'critical' ? 'text-red-400' : a.status === 'warning' ? 'text-yellow-400' : 'text-emerald-400';
        html += `
          <tr class="${rowColor} border-b border-gray-800/50">
            <td class="py-2 pr-3 font-mono text-gray-500 text-xs">${a.id}</td>
            <td class="py-2 pr-3 font-medium ${valColor}">${a.name}</td>
            <td class="py-2 pr-3 text-right font-mono ${valColor}">${a.value}</td>
            <td class="py-2 pr-3 text-right font-mono text-gray-400">${a.worst}</td>
            <td class="py-2 pr-3 text-right font-mono text-gray-500">${a.thresh}</td>
            <td class="py-2 pr-4 text-right font-mono text-gray-400 text-xs">${a.raw}</td>
            <td class="py-2 text-xs text-gray-400 leading-relaxed">${a.info}</td>
          </tr>
        `;
      });

      html += '</tbody></table></div>';
      body.innerHTML = html;
    }

    function animateBars() {
      document.querySelectorAll('.bar').forEach(b => {
        b.style.width = b.dataset.width + '%';
      });
    }

    function showToast(msg, type, details) {
      const el = document.getElementById('toast');
      const icon = document.getElementById('toast-icon');
      const msgEl = document.getElementById('toast-message');
      const detailsEl = document.getElementById('toast-details');
      msgEl.textContent = msg;
      if (details && details.length) {
        detailsEl.innerHTML = details.map(d =>
          '<div class="truncate">' + d.replace(/</g, '&lt;') + '</div>'
        ).join('');
        detailsEl.classList.remove('hidden');
      } else {
        detailsEl.classList.add('hidden');
      }
      icon.innerHTML = type === 'error'
        ? '<svg class="w-5 h-5 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>'
        : '<svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>';
      el.className = 'fixed bottom-6 right-6 z-50 max-w-md bg-gray-900 border border-gray-700 rounded-xl shadow-2xl p-4 transition-all duration-300 translate-y-4 opacity-0';
      el.classList.remove('hidden');
      requestAnimationFrame(() => el.classList.add('show'));
      clearTimeout(el._timeout);
      el._timeout = setTimeout(hideToast, 5000);
    }

    function hideToast() {
      const el = document.getElementById('toast');
      el.classList.remove('show');
      el.classList.add('hidden');
    }

    async function loadFiles() {
      selectedPaths.clear();
      const el = document.getElementById('files-container');
      if (!filesLoaded) {
        el.innerHTML = `<div class="flex justify-center py-12"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-violet-400"></div></div>`;
      }
      try {
        const res = await fetch('/api/largest-files?' + getFilesParam());
        if (!res.ok) throw new Error(res.statusText);
        const files = await res.json();
        renderFiles(files);
        filesLoaded = true;
      } catch(e) {
        if (!filesLoaded) {
          el.innerHTML = `<div class="text-center text-red-400 py-8">Error loading files</div>`;
        }
      }
    }

    function renderFiles(files) {
      const el = document.getElementById('files-container');
      if (!files.length) {
        el.innerHTML = `<div class="text-center text-gray-500 py-8">No files &gt;100 MB found</div>`;
        return;
      }
      const maxSize = files[0].size;
      const rows = files.map((f, i) => {
        const pct = (f.size / maxSize * 100).toFixed(1);
        const hlBadge = f.nlinks > 1 ? `<span class="inline-flex items-center gap-1 px-1.5 py-0.5 rounded text-xs font-medium bg-amber-900/40 text-amber-300 border border-amber-700/40" title="${f.nlinks} hard links"><svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>${f.nlinks}&nbsp;links</span>` : '';
        const hlOrigin = f.other_paths && f.other_paths.length ? `<div class="text-xs text-amber-500/70 truncate mt-0.5">🔗 <span class="text-gray-500">also at</span> ${f.other_paths[0]}${f.other_paths.length > 1 ? ` <span class="text-gray-600">+${f.other_paths.length - 1} more</span>` : ''}</div>` : '';
        const pathAttr = f.path.replace(/"/g, '&quot;');
        return `
          <div class="flex items-center gap-4 px-5 py-3 border-b border-gray-800/50 hover:bg-gray-800/30 transition">
            <div class="w-8 flex items-center">
              <input type="checkbox" class="file-checkbox rounded border-gray-600" data-path="${pathAttr}">
            </div>
            <div class="w-6 text-xs text-gray-600 text-right font-mono">${i+1}</div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2">
                <div class="text-sm font-medium text-gray-200 truncate" title="${f.path}">${f.path}</div>
                ${hlBadge}
              </div>
              <div class="text-xs text-gray-500 truncate">${f.path}</div>
              ${hlOrigin}
            </div>
            <div class="w-24 text-right font-mono text-sm text-gray-300">${f.size_str}</div>
            <div class="w-32">
              <div class="w-full h-2 bg-gray-800 rounded-full overflow-hidden">
                <div class="bar h-full rounded-full bg-violet-500" style="width:0%" data-width="${pct}"></div>
              </div>
            </div>
          </div>
        `;
      }).join('');
      el.innerHTML = `
        <div id="selection-toolbar" class="hidden items-center gap-3 px-5 py-2 bg-indigo-900/30 border-b border-indigo-700/40 text-sm">
          <span id="selection-count" class="text-indigo-300 font-medium"></span>
          <button onclick="confirmDelete()" class="ml-auto px-3 py-1 bg-red-600 hover:bg-red-500 rounded-lg text-white text-xs font-medium transition">Delete Selected</button>
          <button onclick="clearSelection()" class="text-gray-400 hover:text-gray-300 text-xs">Cancel</button>
        </div>
        <div class="bg-gray-900/50 px-5 py-2 text-xs text-gray-500 font-medium flex border-b border-gray-800">
          <div class="w-8 flex items-center">
            <input type="checkbox" id="select-all" class="rounded border-gray-600">
          </div>
          <div class="w-6"></div>
          <div class="flex-1">File</div>
          <div class="w-24 text-right">Size</div>
          <div class="w-32 text-right">Ratio</div>
        </div>
        ${rows}
      `;
      setTimeout(animateBars, 100);
    }

    async function refreshAll() {
      const icon = document.getElementById('refreshIcon');
      icon.classList.add('animate-spin');
      await Promise.all([loadDisks(), loadFiles()]);
      icon.classList.remove('animate-spin');
    }

    let selectedPaths = new Set();

    function clearSelection() {
      selectedPaths.clear();
      document.querySelectorAll('.file-checkbox').forEach(cb => cb.checked = false);
      const selAll = document.getElementById('select-all');
      if (selAll) selAll.checked = false;
      updateSelectionUI();
    }

    function updateSelectionUI() {
      const toolbar = document.getElementById('selection-toolbar');
      const count = document.getElementById('selection-count');
      if (!toolbar || !count) return;
      const n = selectedPaths.size;
      count.textContent = n + ' file' + (n !== 1 ? 's' : '') + ' selected';
      toolbar.classList.toggle('hidden', n === 0);
      toolbar.classList.toggle('flex', n > 0);
    }

    function toggleSelectAll(checked) {
      document.querySelectorAll('.file-checkbox').forEach(cb => {
        cb.checked = checked;
        const path = cb.dataset.path;
        if (checked) selectedPaths.add(path);
        else selectedPaths.delete(path);
      });
      updateSelectionUI();
    }

    function confirmDelete() {
      const count = document.getElementById('delete-count');
      const list = document.getElementById('delete-file-list');
      const paths = Array.from(selectedPaths);
      count.textContent = paths.length;
      list.textContent = '';
      paths.forEach(p => {
        const div = document.createElement('div');
        div.className = 'truncate font-mono text-xs text-gray-300';
        div.textContent = p;
        list.appendChild(div);
      });
      document.getElementById('delete-modal').classList.remove('hidden');
    }

    function closeDeleteModal() {
      document.getElementById('delete-modal').classList.add('hidden');
    }

    async function executeDelete() {
      const btn = document.getElementById('confirm-delete-btn');
      btn.disabled = true;
      btn.textContent = 'Deleting...';

      const paths = Array.from(selectedPaths);
      try {
        const res = await fetch('/api/delete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ paths })
        });
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || res.statusText);
        }
        const results = await res.json();
        closeDeleteModal();
        clearSelection();
        loadFiles();

        const succeeded = results.filter(r => r.success).length;
        const failed = results.filter(r => !r.success);
        if (failed.length > 0) {
          const details = failed.map(r => r.path + ' — ' + r.error);
          showToast(succeeded + ' deleted, ' + failed.length + ' failed', 'error', details);
        } else {
          showToast(succeeded + ' file(s) deleted successfully', 'success');
        }
      } catch(e) {
        showToast('Error deleting files: ' + e.message, 'error');
        closeDeleteModal();
      } finally {
        btn.disabled = false;
        btn.textContent = 'Delete';
      }
    }

    document.getElementById('files-container').addEventListener('change', function(e) {
      if (e.target.classList.contains('file-checkbox')) {
        const path = e.target.dataset.path;
        if (e.target.checked) selectedPaths.add(path);
        else selectedPaths.delete(path);
        const selAll = document.getElementById('select-all');
        if (selAll) {
          const all = document.querySelectorAll('.file-checkbox');
          selAll.checked = all.length > 0 && Array.from(all).every(cb => cb.checked);
        }
        updateSelectionUI();
      }
      if (e.target.id === 'select-all') {
        toggleSelectAll(e.target.checked);
      }
    });

    document.getElementById('delete-modal').addEventListener('click', function(e) {
      if (e.target === this) closeDeleteModal();
    });

    document.getElementById('dir-select').addEventListener('change', function() {
      focusedMount = null;
      document.getElementById('focused-badge').classList.add('hidden');
      renderDisks(disksData);
      loadFiles();
    });

    document.getElementById('smart-modal').addEventListener('click', function(e) {
      if (e.target === this) closeSmart();
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') { closeSmart(); closeDeleteModal(); }
    });

    loadDisks();
  </script>
</body>
</html>
